<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>casuya-bridge: Simple Lesson Demo</title>
</head>
<body>
  <h1>Simple Lesson Demo</h1>
  <div id="lesson-mount" style="height: 400px; border: 1px solid #ccc;"></div>
  <script type="module">
    import { CasuyaBridge } from '../../dist/casuya-bridge.esm.js';

    const bridge = new CasuyaBridge({ apiBaseUrl: 'https://api.casuya.co.tz' });
    bridge.start();

    // In a real app, packageStore would already be populated by a prior
    // sync. Here we seed it directly for demo purposes.
    await bridge.runtime.packageStore.save('demo-lesson', {
      body_html: '<h2>Welcome to Casuya</h2><p>This lesson was rendered entirely from a cached package.</p>',
    });
    await bridge.runtime.manifestStore.save('demo-lesson', {
      metadata: { title: 'Demo Lesson', slug: 'demo-lesson' },
      dependencies: { stylesheets: [], scripts: [] },
    });

    await bridge.renderLesson('demo-lesson', document.getElementById('lesson-mount'));
  </script>
</body>
</html>
